<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<title>TableTop Beamer — Redesign Vorschlag</title>
<meta name="viewport" content="width=1440, initial-scale=1"/>
<link rel="stylesheet" href="foundations.css?v=5"/>
<link rel="stylesheet" href="components.css?v=5"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="RoomStage.jsx"></script>
<script type="text/babel" src="AnimationLibrary.jsx"></script>
<script type="text/babel" src="ThemeToggle.jsx"></script>
<script type="text/babel" src="Artboard-Obsidian.jsx"></script>
<script type="text/babel" src="Artboard-Bone.jsx"></script>
<script type="text/babel" src="Artboard-Inkwell.jsx"></script>
<script type="text/babel" src="Artboard-Foundations.jsx"></script>
<script type="text/babel" src="Artboard-AnimationEditor.jsx"></script>
<script type="text/babel" src="Artboard-MobilePlay.jsx"></script>
<script type="text/babel" src="Artboard-MobileEditor.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas
      title="TableTop Beamer — Redesign v2 (Obsidian)"
      subtitle="Dark + Light · Animation Editor mit Icon-Picker · Mobile Screens"
    >
      <DCSection id="desktop" title="Desktop — Play (Dark + Light)">
        <DCArtboard id="obsidian-dark" label="Play · Dark" width={1280} height={832}>
          <ArtboardObsidian theme="dark"/>
        </DCArtboard>
        <DCArtboard id="obsidian-light" label="Play · Light" width={1280} height={832}>
          <ArtboardObsidian theme="light"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="editor" title="Setup — Animation Editor mit Icon-Picker">
        <DCArtboard id="editor-dark" label="Editor · Dark" width={1280} height={832}>
          <AnimationEditor theme="dark"/>
        </DCArtboard>
        <DCArtboard id="editor-light" label="Editor · Light" width={1280} height={832}>
          <AnimationEditor theme="light"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Mobile — iPhone 375×812">
        <DCArtboard id="mobile-play-dark" label="Play · Dark" width={375} height={812}>
          <MobilePlay theme="dark"/>
        </DCArtboard>
        <DCArtboard id="mobile-play-light" label="Play · Light" width={375} height={812}>
          <MobilePlay theme="light"/>
        </DCArtboard>
        <DCArtboard id="mobile-editor-dark" label="Edit Animation · Dark" width={375} height={812}>
          <MobileEditor theme="dark"/>
        </DCArtboard>
        <DCArtboard id="mobile-editor-light" label="Edit Animation · Light" width={375} height={812}>
          <MobileEditor theme="light"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="alt" title="Alternative Richtungen (zum Vergleich)">
        <DCArtboard id="bone" label="B · Bone" width={1280} height={832}>
          <ArtboardBone/>
        </DCArtboard>
        <DCArtboard id="inkwell" label="C · Inkwell" width={1280} height={832}>
          <ArtboardInkwell/>
        </DCArtboard>
      </DCSection>

      <DCSection id="foundations" title="Shared Foundations">
        <DCArtboard id="spec" label="Palette · Type · Icons · Komponenten" width={1280} height={1180}>
          <ArtboardFoundations/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
