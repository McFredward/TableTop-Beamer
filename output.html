<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TableTop Beamer — Output</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <!-- Phase 34 D-03 thin consumer: NO render pipeline. Pi /output/ shows
       the H264 stream from /api/webrtc/signal + a Pi-local audio binder.
       SSR Chromium tab loads the FULL app at /ssr, not here.
       Only required scripts: runtime-env.js, receiver-bootstrap.js,
       output-audio-binder.js, inline diagnostic chip rAF. -->
</head>
<body data-output-role="final-output">
  <!-- Phase 31 Plan 03 receiver DOM. Hidden flags match index.html. -->
  <div id="ssr-splash" class="ssr-splash" hidden>
    <div class="ssr-splash-content">
      <h1 class="ssr-splash-logo">TableTop Beamer</h1>
      <p class="ssr-splash-status" id="ssr-splash-status">Connecting to render server…</p>
      <div class="ssr-splash-spinner" aria-hidden="true"></div>
    </div>
  </div>
  <video id="ssr-video" class="ssr-video" autoplay muted playsinline hidden></video>
  <div id="ssr-reconnect-banner" class="ssr-reconnect-banner" role="status" aria-live="polite" hidden>
    Server reconnecting…
  </div>
  <div id="ssr-error-overlay" class="ssr-error-overlay" role="alertdialog" aria-modal="true" hidden>
    <div class="ssr-error-content">
      <h2 class="ssr-error-title">Render server unreachable</h2>
      <p class="ssr-error-body" id="ssr-error-body">The connection to the render server has been lost.</p>
      <button id="ssr-retry-button" class="ssr-error-retry" type="button">Retry</button>
    </div>
  </div>

  <!-- Diagnostic chip — fps + render-mode + canvas + frame-cost. The
       render-mode + frame-cost fields are only meaningful inside the
       SSR-tab (the full app on /ssr); on the thin /output/ they show
       "stream" (no local rendering). The full chip stays as DOM
       because user wanted it visible (h17). -->
  <div id="output-status-chip" class="output-status-chip" hidden>
    <span id="output-status-version"></span>
    <span id="output-status-fps">- fps</span>
    <span id="output-status-mode">stream</span>
    <span id="output-status-canvas">-</span>
    <span id="output-status-frame-cost">-</span>
  </div>

  <!-- ssr-input-overlay is created lazily by receiver-bootstrap if
       absent, but pre-declaring it here matches the index.html
       contract and avoids a layout-thrash on first align-mode tap. -->
  <div id="ssr-input-overlay" style="position:fixed;inset:0;z-index:4;touch-action:none;pointer-events:none"></div>

  <!-- Phase 35 D-01 (Track A): #stage and #room-overlay are required
       by bootAlignMode (handle-ui mounts handles inside #stage; the
       polygon-editor renders SVG polygons inside #room-overlay; the
       CSS rule at src/styles.css:119 gates handle visibility on
       body.align-mode-active). Both elements stay zero-overhead when
       align-mode is inactive (no rendering happens until the live-sync
       sub fires onAlignModeChange(true)). -->
  <div id="stage" class="stage" style="position:fixed;inset:0;z-index:3;pointer-events:none">
    <svg id="room-overlay" class="room-overlay" viewBox="0 0 1000 1000" preserveAspectRatio="none"></svg>
  </div>

  <!-- Phase 34 D-03 + Phase 35 D-02 (Track B): minimal script set. Order matters:
       1. runtime-env.js  — exposes window.TT_BEAMER_RUNTIME_ENV
          consumed by receiver-bootstrap (output-role detection).
       2. inline diagnostic-chip rAF — fps sampling only (D-03 strip:
          no render-mode probe locally; render-mode lives on /ssr).
       3. output-live-sync.js (module inline) — Phase 35 D-02 thin
          live-sync subscriber. Boots FIRST so receiver + audio-binder
          consume the SAME subscription (single WS to /api/live/ws).
          Exposed on window.__ttbLiveSync.
       4. receiver-bootstrap.js (module inline-import) — boots the WebRTC consumer.
       5. output-audio-binder.js (module inline-import) — Pi-local audio.
  -->
  <script src="/src/app/lib/shared/runtime-env.js" defer></script>
  <script>
    // Phase 34 D-03: thin diagnostic chip — fps from rAF only; no
    // render-mode (this page does not render), no frame-cost (no
    // draw loop). The chip is hidden by default; shown once DOMContentLoaded.
    document.addEventListener("DOMContentLoaded", () => {
      const chip = document.getElementById("output-status-chip");
      const fpsEl = document.getElementById("output-status-fps");
      const samples = [];
      let last = performance.now();
      (function tick(){
        const t = performance.now();
        const d = t - last; last = t;
        if (d > 0 && d < 2000) { samples.push(d); if (samples.length > 60) samples.shift(); }
        requestAnimationFrame(tick);
      })();
      setInterval(() => {
        if (!fpsEl || samples.length === 0) return;
        const avg = samples.reduce((a,b)=>a+b,0) / samples.length;
        fpsEl.textContent = `${(1000/avg).toFixed(1)} fps`;
      }, 500);
      if (chip) chip.hidden = false;
    });
  </script>
  <!-- Phase 35 D-02 Track B: Boot the shared live-sync subscription FIRST.
       Both bootReceiver and bootOutputAudioBinder consume window.__ttbLiveSync
       so the page opens ONE WS to /api/live/ws?role=final-output instead of two. -->
  <script type="module">
    import { bootOutputLiveSync } from "/src/app/runtime/output-receiver/output-live-sync.js";
    window.__ttbLiveSync = bootOutputLiveSync({ logger: console, role: "final-output" });
  </script>
  <!-- Boot the receiver bootstrap. -->
  <script type="module">
    import { bootReceiver } from "/src/app/runtime/output-receiver/receiver-bootstrap.js";
    bootReceiver({ logger: console, liveSync: window.__ttbLiveSync }).catch((err) => {
      console.error("[output] receiver bootstrap failed", err);
      const splash = document.getElementById("ssr-splash");
      const errorOverlay = document.getElementById("ssr-error-overlay");
      const errorBody = document.getElementById("ssr-error-body");
      if (splash) splash.hidden = true;
      if (errorOverlay) errorOverlay.hidden = false;
      if (errorBody) errorBody.textContent =
        `Receiver bootstrap failed: ${err?.message ?? err}. Reload the page to retry.`;
    });
  </script>
  <!-- Boot the audio binder. Best-effort — failures don't block video. -->
  <script type="module">
    import { bootOutputAudioBinder } from "/src/app/runtime/output-receiver/output-audio-binder.js";
    bootOutputAudioBinder({ logger: console, liveSync: window.__ttbLiveSync }).catch((err) => {
      console.warn("[output-audio] binder failed:", err?.message);
    });
  </script>

  <!-- Phase 35 D-01 (Track A): align-mode IIFE modules. ALL HAVE `defer`
       so the browser executes them in document order (Pitfall 5 mitigation:
       handle-ui's parse-time `dragModule = window.TT_BEAMER_RUNTIME_PROJECTION_HANDLE_DRAG`
       lookup at line 55 requires drag module to be parsed first).

       Order matters:
         1. polygon-contract  — base library
         2. runtime-polygon-normalizers  — used by polygon-editor's ctx
         3. runtime-projection-grid-state  — owns grid points / undo
         4. runtime-projection-gl-renderer  — GL warp path (auto-wires)
         5. runtime-projection-2d-fallback-renderer  — 2D warp fallback
         6. runtime-projection-profile-persistence  — profile save/load
         7. runtime-projection-handle-drag  — drag handlers (handle-ui parse-time dep)
         8. runtime-projection-handle-ui  — handle DOM lifecycle + render
         9. runtime-projection-mapping  — orchestrates all above (the shim)
        10. runtime-polygon-editor-handles  — polygon vertex/edge handles
        11. runtime-polygon-editor  — top-level renderRoomOverlay

       Note on script-tag count: this exceeds the CONTEXT.md ≤8 advisory
       (now ~17 with these 11 IIFEs). The advisory was not locked; the
       defer'd IIFEs are register-on-window only — no blocking work at
       load time. Inlining a build-step bundle is out of project scope.
       Per RESEARCH §A.4. -->
  <script src="/src/app/runtime/core/polygon-contract.js" defer></script>
  <script src="/src/app/runtime/state/runtime-polygon-normalizers.js" defer></script>
  <script src="/src/app/runtime/viewport/runtime-projection-grid-state.js" defer></script>
  <script src="/src/app/runtime/viewport/runtime-projection-gl-renderer.js" defer></script>
  <script src="/src/app/runtime/viewport/runtime-projection-2d-fallback-renderer.js" defer></script>
  <script src="/src/app/runtime/viewport/runtime-projection-profile-persistence.js" defer></script>
  <script src="/src/app/runtime/viewport/runtime-projection-handle-drag.js" defer></script>
  <script src="/src/app/runtime/viewport/runtime-projection-handle-ui.js" defer></script>
  <script src="/src/app/runtime/viewport/runtime-projection-mapping.js" defer></script>
  <script src="/src/app/runtime/polygon-editor/runtime-polygon-editor-handles.js" defer></script>
  <script src="/src/app/runtime/polygon-editor/runtime-polygon-editor.js" defer></script>

  <!-- Boot bootAlignMode after the IIFEs above register on window AND
       after the live-sync subscription is up. Defer'd IIFEs all run
       before DOMContentLoaded fires, so the addEventListener callback
       is the safe gate. Thin args — most polygon-editor ctx fields are
       no-op stubs because /output/'s renderRoomOverlay path is read-only
       (per RESEARCH §A.1). -->
  <script type="module">
    import { bootAlignMode } from "/src/app/runtime/output-receiver/output-align-mode.js";
    window.addEventListener("DOMContentLoaded", () => {
      try {
        const stage = document.getElementById("stage") ?? document.body;
        const roomOverlay = document.getElementById("room-overlay");
        const videoEl = document.getElementById("ssr-video");
        if (!roomOverlay) {
          console.warn("[output-align-mode] #room-overlay missing — bootAlignMode aborted");
          return;
        }
        const noop = () => {};
        const noopReturnNull = () => null;
        const noopReturnFalse = () => false;
        const noopReturnTrue = () => true;
        const noopReturnEmptyArr = () => [];
        const state = window.__ttbState ?? {
          alignMode: false,
          boardId: null,
          renderMode: "auto",
          polygonEditor: { activeRoomIdByBoard: {} },
          shipPolygonEditor: {
            dragVertexIndex: null, dragPointerId: null, dragBoardId: null,
            dragStartPoints: null, dragMoved: false,
            dragVertexOffsetX: 0, dragVertexOffsetY: 0, dragDomRefs: null,
          },
          runtime: { activeProjectionProfileId: null },
        };
        window.__ttbState = state;
        // Fall back to window.TT_BEAMER_RUNTIME_POLYGON_NORMALIZERS if the
        // normalizers IIFE registered itself; else use trivial identity stubs
        // (renderRoomOverlay's read-only path needs only normalizePolygonPoint).
        const NORMS = window.TT_BEAMER_RUNTIME_POLYGON_NORMALIZERS ?? null;
        const normalizers = NORMS ? {
          normalizePolygonPoint: NORMS.normalizePolygonPoint ?? ((p) => p),
          getNormalizedPolygonArea: NORMS.getNormalizedPolygonArea ?? (() => 0),
          isRenderableNormalizedPolygon: NORMS.isRenderableNormalizedPolygon ?? noopReturnFalse,
          normalizeShipPolygon: NORMS.normalizeShipPolygon ?? ((p) => p),
          remapGridPoint: ((nx, ny) => ({ x: nx, y: ny })),
          hasGridDisplacements: noopReturnFalse,
        } : undefined;
        window.__ttbAlignMode = bootAlignMode({
          stage, roomOverlay, videoEl, state,
          outputRole: "final-output",
          OUTPUT_ROLE_FINAL: "final-output",
          OUTPUT_ROLE_CONTROL: "control",
          liveSync: window.__ttbLiveSync,
          polygonContract: window.TT_BEAMER_POLYGON_CONTRACT ?? null,
          normalizers,
          boardAccess: {
            getBoard: noopReturnNull, getBoards: noopReturnEmptyArr,
            getRoomPoints: noopReturnEmptyArr, getRoomLabelPosition: noopReturnNull,
            getSpecialRooms: noopReturnEmptyArr,
            getShipPolygonPoints: noopReturnEmptyArr, setShipPolygonPoints: noop,
            getRoomPolygonPoints: noopReturnEmptyArr, setRoomPolygonPoints: noop,
            getPlayAreas: noopReturnEmptyArr, getSelectedPlayArea: noopReturnNull,
            getSelectedPlayAreaId: noopReturnNull, getBoardZoom: () => 1,
          },
          polygonState: {
            getActivePolygonRoomId: noopReturnNull, setActivePolygonRoomId: noop,
            isRoomFrozen: noopReturnFalse,
            getCurrentPolygonHandleScale: () => 1,
            getPolygonEditorHandleMetrics: () => ({ size: 12 }),
          },
          interactions: {
            beginPolygonDragInteraction: noop, endPolygonDragInteraction: noop,
            isPanArbitrating: noopReturnFalse, isAcceptablePolygonPointerEvent: noopReturnTrue,
            arePlayAreaVerticesEditable: noopReturnFalse, areRoomVerticesEditable: noopReturnFalse,
            mapClientPointToNormalized: (cx, cy) => [cx, cy],
            setPlayAreaPolygon: noop,
          },
          persistence: { persistBoardProfiles: noop, pushUndoState: noop, saveProjectionMapping: noop },
          sync: {
            syncShipPolygonEditorStatus: noop, syncShipPolygonVertexSelect: noop,
            syncPolygonVertexSelect: noop, syncPolygonEdgeSelect: noop,
            syncPolygonEditorStatus: noop, syncPolygonEditorPanel: noop,
            syncRoomPanelFromSelection: noop, syncSelectedRoomStateForBoard: noop,
            refreshPersistentRoomSelectionVisualState: noop,
          },
          dashboard: {
            isQuickModeActive: noopReturnFalse, handleQuickModeRoomTap: noop,
            applyRoomDraftTargetFromRoomClick: noop,
            cacheShipPolygonDragDomRefs: noopReturnNull,
            cacheRoomPolygonDragDomRefs: noopReturnNull,
          },
          renderRoomOverlay: noop, // bootAlignMode falls back to POLYGON_EDITOR.renderRoomOverlay
          logger: console,
        });
        console.log("[output-align-mode] bootAlignMode wired");
      } catch (err) {
        console.error("[output-align-mode] bootAlignMode failed:", err);
      }
    });
  </script>
</body>
</html>
